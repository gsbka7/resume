<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>7-21 画像縮小（ぼかし）＋テキスト</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<!--==============レイアウトを制御する独自のCSSを読み込み===============-->
<link rel="stylesheet" type="text/css" href="http://coco-factory.jp/ugokuweb/wp-content/themes/ugokuweb/data/move02/7-21/css/reset.css">
>
</head>

<style>

@charset "utf-8";

/*　画像の縮小＋テキスト出現　*/

.zoomOutText{/*背景色とテキストの基点となる位置を定義*/
	position: relative;
}

.zoomOutText span.mask{
	position: relative;
	transition: .3s ease-in-out;/*移り変わる速さを変更したい場合はこの数値を変更*/
	display: block;/*画像をくくるspanタグをブロック要素にする*/

    overflow:hidden;/*拡大してはみ出る要素を隠す*/
}

.zoomOutText:hover span.mask::before{/*hoverした時の変化*/
	content:"";
	position: absolute;
	z-index:2;
	top:10px;
	left:10px;
	width: calc(100% - 20px);
    height: calc(100% - 20px);
	background:rgba(0,0,0,0.5);/*背景色*/
}

.zoomOutText img{
	transform: scale(1.2);
	filter: blur(0);
	transition: .3s ease-in-out;/*移り変わる速さを変更したい場合はこの数値を変更*/
}

.zoomOutText:hover img{/*hoverした時の変化*/
	transform: scale(1);/*縮小の値を変更したい場合はこの数値を変更*/
	filter: blur(2px);/*ぼかし具合を変更したい場合はこの数値を変更*/
}



/*========= レイアウトのためのCSS ===============*/

a{
	color: #333;
	text-decoration: none;
}

.lead{
	text-align: center;
	padding: 50px 20px;
}

/*画像のレスポンシブ*/

img{
	width:100%;
	height: auto;
}

/*　横幅　*/

.zoomOutText{
	width: 70%;
    margin: 0 auto;/*中央揃え*/
}


</style>

<body>
<p class="lead">画像縮小（ぼかし）＋テキスト</p>
	
<div class="zoomOutText">
    <a href="#">
        <span class="mask">
            <img src="http://coco-factory.jp/ugokuweb/wp-content/themes/ugokuweb/data/move02/7-21/img/07.jpg" alt="">
            <span class="cap">画像縮小（ぼかし）＋テキストが出現 ZoomOutText</span>
        </span>
    </a>
</div>
</body>
</html>
